<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Web Page Project</title>
    <link rel="stylesheet" href="style-survey.css">
</head>
<body>
    <main>
        <h1>Gamer Survey</h1>
        <p id="paragraph">These questions below are meant for gamers so if you don't understand them just back out and explore the home page! </p>
        <form id="form">
            <div class="input-control">
                <label for="first-q">What is your favorite genre for games?</label>
                <input type="text" name="first-q" id="first-q" placeholder="FPS, Survival, RPG, etc.">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <p>Do you like playing...
                <label for="second-q"></label>
                <input type="radio" name="second-q" id="second-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="third-q">third question</label>
                <input type="text" name="third-q" id="third-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="fourth-q">fourth question</label>
                <input type="text" name="fourth-q" id="fourth-q">
                <div class="error"></div>
            </div>
             <div class="input-control"> 
                <label for="fifth-q">fifth-q question</label>
                <input type="text" name="fifth-q" id="fifth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="sixth-q">sixth question</label>
                <input type="text" name="sixth-q" id="sixth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="seventh-q">seventh question</label>
                <input type="text" name="seventh-q" id="seventh-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="eighth">eighth question</label>
                <input type="text" name="eighth-q" id="eighth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="nineth-q">nineth-q question</label>
                <input type="text" name="nineth-q" id="nineth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="tenth-q">tenth question</label>
                <input type="text" name="tenth-q" id="tenth-q">
                <div class="error"></div>
            </div>
            <button id="submit">Submit</button>
        </form>
    </main>
    <script src="survey.js"></script>
</body>
</html>
