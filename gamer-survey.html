<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Web Page Project</title>
    <link rel="stylesheet" href="style-survey.css">
</head>
<body>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Back to Home Page</a></li>
        </ul>
    </nav>
    <main>
        <h1>Gamer Survey</h1>
        <p id="paragraph">These questions below are meant for gamers so if you don't understand them just back out and explore the home page! </p>
        <form id="form">
            <div class="input-control">
                <label for="first-q">What is your favorite genre for games?</label>
                <input type="text" name="first-q" id="first-q" placeholder="FPS, Survival, RPG, etc.">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="fourth-q">How long are your gaming sessions?</label>
                <input type="text" name="fourth-q" id="fourth-q">
                <div class="error"></div>
            </div>
             <div class="input-control"> 
                <label for="fifth-q">What type of platform do you use for gaming?</label>
                <input type="text" name="fifth-q" id="fifth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="sixth-q">Are retro games fun?</label>
                <input type="text" name="sixth-q" id="sixth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="seventh-q">When do you realize you need to hop off?</label>
                <input type="text" name="seventh-q" id="seventh-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="eighth">If you could pick a streamer you could play with who what it be?</label>
                <input type="text" name="eighth-q" id="eighth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="nineth-q">Will you make a career off of playing games?</label>
                <input type="text" name="nineth-q" id="nineth-q">
                <div class="error"></div>
            </div>
             <div class="input-control">
                <label for="tenth-q">How long has it been since you last play your favorite game?</label>
                <input type="text" name="tenth-q" id="tenth-q">
                <div class="error"></div>
            </div>
            <button id="submit">Submit</button>
        </form>
    </main>
    <script src="survey.js"></script>
</body>
</html>
